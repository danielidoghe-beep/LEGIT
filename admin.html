<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEGIT Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

<h2>👑 LEGIT Admin Panel</h2>

<h3 id="adminEmail">Loading...</h3>

<div class="balance-card">
<h3>Total Users</h3>
<h1 id="totalUsers">0</h1>
</div>

<div class="card">
<h3>Admin Controls</h3>
<p>Manage users and balances from here.</p>
</div>

<h3>Registered Users</h3>

<div id="usersList">
Loading users...
</div>

<template id="userCardTemplate">
  <div class="card">
    <h3 class="userEmail"></h3>
    <p>Balance: <strong class="userBalance">$0.00</strong></p>

    <input
      type="number"
      class="balanceInput"
      placeholder="Enter new balance"
      min="0"
      step="0.01"
    >

    <button class="updateBalanceBtn">
      💾 Update Balance
    </button>

    <hr>
  </div>
</template>

<button id="logoutBtn">🚪 Logout</button>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
